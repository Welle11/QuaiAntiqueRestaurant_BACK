security:
    enable_authenticator_manager: true
    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        options_preflight:
            pattern: ^/
            methods: [OPTIONS]
            security: false
        main:
            lazy: true
            stateless: true
            provider: app_user_provider
            custom_authenticator: App\Security\ApiTokenAuthenticator
            json_login:
                check_path: app_api_login

    access_control:
        - { path: ^/api/registration, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc, roles: PUBLIC_ACCESS }
        - { path: ^/api/picture, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/picture, methods: [POST, PUT, DELETE], roles: ROLE_ADMIN }
        - { path: ^/api/menu, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/menu, methods: [POST, PUT, DELETE], roles: ROLE_ADMIN }
        - { path: ^/api/reservation, roles: ROLE_USER }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

                
